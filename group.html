<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .header {
      padding: 15px;
      color: white;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.2);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .username {
      font-weight: bold;
      font-size: 12px;
      opacity: 0.8;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">💬 Group Chat</div>

<div class="messages" id="messages"></div>

<div class="inputBox">
  <input type="text" id="message" placeholder="Type message...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBzk8AryQPB6q3MOBKTNwA2wjjFlmAbanY",
  authDomain: "sign-and-login-b0ca1.firebaseapp.com",
  projectId: "sign-and-login-b0ca1",
  appId: "1:1008527063684:web:96a489d7168adc2f7a20d1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔒 Prevent skipping setup
if (!localStorage.getItem("username")) {
  window.location.href = "username.html";
}

const username = localStorage.getItem("username");

// 📥 Load messages in real-time
db.collection("messages")
.orderBy("time")
.onSnapshot(snapshot => {
  const messagesDiv = document.getElementById("messages");
  messagesDiv.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    const msg = document.createElement("div");
    msg.className = "msg";
    msg.innerHTML = `
      <div class="username">${data.username}</div>
      <div>${data.text}</div>
    `;

    messagesDiv.appendChild(msg);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});

// 📤 Send message
function sendMessage() {
  const text = document.getElementById("message").value;

  if (!text) return;

  db.collection("messages").add({
    username: username,
    text: text,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}
</script>

</body>
</html>
