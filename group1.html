<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: linear-gradient(-45deg,#667eea,#764ba2,#6a11cb,#2575fc);
      background-size: 400% 400%;
      animation: bgMove 10s ease infinite;
    }

    @keyframes bgMove {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .sidebar {
      width: 30%;
      background: rgba(0,0,0,0.3);
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    .chatArea {
      width: 70%;
      display: flex;
      flex-direction: column;
    }

    .group {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .group:hover {
      background: rgba(255,255,255,0.2);
    }

    .messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      color: white;
    }

    .msg {
      margin-bottom: 10px;
      background: rgba(255,255,255,0.2);
      padding: 8px;
      border-radius: 10px;
    }

    .inputBox {
      display: flex;
      padding: 10px;
      background: rgba(0,0,0,0.3);
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #00c6ff;
      color: white;
    }

    .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .headerTitle {
      color: white;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="top">
    <b>Groups</b>
    <button onclick="openModal()">➕</button>
  </div>

  <div id="groups"></div>
</div>

<!-- CHAT -->
<div class="chatArea">

  <div class="headerTitle">Select a group</div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<!-- CREATE GROUP MODAL -->
<div id="groupModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; border-radius:15px; width:300px; text-align:center;">
    <h3>Create Group</h3>

    <input id="groupName" placeholder="Group Name">

    <select id="groupType">
      <option value="public">Public</option>
      <option value="private">Private</option>
    </select>

    <button onclick="saveGroup()">Create</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- GROUP INFO MODAL -->
<div id="infoModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">
  <div style="background:white; padding:20px; border-radius:15px; width:300px;">
    
    <h3>Group Info</h3>

    <p id="groupInfoName"></p>
    <p id="groupInfoAdmin"></p>

    <h4>Members</h4>
    <ul id="memberList"></ul>

    <input id="newMember" placeholder="Add username">
    <button onclick="addMember()">➕ Add Member</button>

    <br><br>
    <button onclick="closeInfo()">Close</button>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBzk8AryQPB6q3MOBKTNwA2wjjFlmAbanY",
  authDomain: "sign-and-login-b0ca1.firebaseapp.com",
  projectId: "sign-and-login-b0ca1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

if (!localStorage.getItem("username")) {
  window.location.href = "username.html";
}

const username = localStorage.getItem("username");

let currentGroup = null;
let currentGroupData = null;
let currentGroupId = null;

// LOAD GROUPS
db.collection("groups").orderBy("createdAt")
.onSnapshot(snapshot => {
  const groupsDiv = document.getElementById("groups");
  groupsDiv.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();

    const div = document.createElement("div");
    div.className = "group";
    div.innerText = data.name;

    div.onclick = () => openGroup(doc.id, data);

    groupsDiv.appendChild(div);
  });
});

// OPEN CREATE MODAL
function openModal() {
  document.getElementById("groupModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("groupModal").style.display = "none";
}

// SAVE GROUP
function saveGroup() {
  const name = document.getElementById("groupName").value;
  const type = document.getElementById("groupType").value;

  if (!name) return alert("Enter group name");

  db.collection("groups").add({
    name: name,
    type: type,
    admin: username,
    members: [username],
    createdAt: Date.now()
  });

  closeModal();
}

// OPEN GROUP
function openGroup(id, data) {
  currentGroup = id;
  currentGroupData = data;
  currentGroupId = id;

  const header = document.querySelector(".headerTitle");
  header.innerText = data.name;

  // CLICK HEADER → GROUP INFO
  header.onclick = () => {
    openGroupInfo(data, id);
  };

  db.collection("groups")
    .doc(id)
    .collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {
      const messagesDiv = document.getElementById("messages");
      messagesDiv.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = document.createElement("div");
        msg.className = "msg";
        msg.innerHTML = `<b>${doc.data().username}</b><br>${doc.data().text}`;
        messagesDiv.appendChild(msg);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });
}

// SEND MESSAGE
function sendMessage() {
  const text = document.getElementById("message").value;

  if (!text || !currentGroup) return;

  db.collection("groups")
    .doc(currentGroup)
    .collection("messages")
    .add({
      username: username,
      text: text,
      time: Date.now()
    });

  document.getElementById("message").value = "";
}

// GROUP INFO
function openGroupInfo(data, id) {
  currentGroupData = data;
  currentGroupId = id;

  document.getElementById("groupInfoName").innerText = "Name: " + data.name;
  document.getElementById("groupInfoAdmin").innerText = "Admin: " + data.admin;

  const list = document.getElementById("memberList");
  list.innerHTML = "";

  data.members.forEach(m => {
    const li = document.createElement("li");
    li.innerText = m;
    list.appendChild(li);
  });

  document.getElementById("infoModal").style.display = "flex";
}

function closeInfo() {
  document.getElementById("infoModal").style.display = "none";
}

// ADD MEMBER
function addMember() {
  const newUser = document.getElementById("newMember").value;

  if (!newUser) return alert("Enter username");

  let updatedMembers = currentGroupData.members;

  if (!updatedMembers.includes(newUser)) {
    updatedMembers.push(newUser);
  }

  db.collection("groups").doc(currentGroupId).update({
    members: updatedMembers
  });

  document.getElementById("newMember").value = "";
}
</script>

</body>
</html>
